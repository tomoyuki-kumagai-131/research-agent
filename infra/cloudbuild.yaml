steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/research-agent/api:$SHORT_SHA
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/research-agent/api:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/research-agent/api

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - research-agent-api
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/research-agent/api:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --timeout=300
      - --concurrency=10
      - --max-instances=3
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,DIFY_API_KEY=DIFY_API_KEY:latest
      - --set-env-vars=DIFY_API_BASE=https://api.dify.ai/v1,NODE_ENV=production

substitutions:
  _REGION: asia-northeast1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
